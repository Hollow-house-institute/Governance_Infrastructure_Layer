<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HHI Governance Dashboard</title>
<style>
body { font-family: system-ui; background:#0f172a; color:#e2e8f0; margin:0; }
.container { max-width:1100px; margin:auto; padding:20px; }
.tabs { display:flex; gap:10px; margin-bottom:20px; }
.tab { padding:10px 16px; background:#1e293b; border-radius:8px; cursor:pointer; }
.tab.active { background:#38bdf8; color:#0f172a; }
.card { background:#1e293b; padding:20px; border-radius:12px; margin-top:10px; }
pre { white-space:pre-wrap; font-size:12px; }
</style>
</head>

<body>
<div class="container">

<h2>HHI Governance Dashboard</h2>

<div class="tabs">
  <div class="tab active" onclick="showTab('cfo')">CFO</div>
  <div class="tab" onclick="showTab('cto')">CTO</div>
  <div class="tab" onclick="showTab('audit')">Audit</div>
</div>

<div id="content"></div>

</div>

<script>
async function loadData(){
  const metrics = await fetch('/telemetry/metrics.log').then(r=>r.text()).catch(()=> "No metrics");
  const logs = await fetch('/runtime/logs/auth.log').then(r=>r.text()).catch(()=> "No logs");
  const esc = await fetch('/runtime/escalation/escalation.json').then(r=>r.text()).catch(()=> "No escalation");

  return {metrics, logs, esc};
}

async function showTab(role){
  const data = await loadData();
  let html = "";

  if(role === "cfo"){
    html = `
      <div class="card">
        <h3>Risk & Stability</h3>
        <pre>${data.metrics}</pre>
      </div>
    `;
  }

  if(role === "cto"){
    html = `
      <div class="card">
        <h3>System Logs</h3>
        <pre>${data.logs}</pre>
      </div>
    `;
  }

  if(role === "audit"){
    html = `
      <div class="card">
        <h3>Audit Trace</h3>
        <pre>${data.logs}</pre>
      </div>
      <div class="card">
        <h3>Escalation Events</h3>
        <pre>${data.esc}</pre>
      </div>
    `;
  }

  document.getElementById("content").innerHTML = html;

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t => {
    if(t.innerText.toLowerCase() === role) t.classList.add("active");
  });
}

showTab('cfo');
</script>

</body>
</html>
